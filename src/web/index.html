<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Autoshop</title>
<style>
  :root { --bg:#141518; --panel:#1e2023; --panel2:#26292d; --line:#33373b; --fg:#e9e9ea; --muted:#9aa0a6; --accent:#4c8bf5; --accent2:#2b5fb8; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--fg); }

  header { padding:8px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:700; letter-spacing:.02em; }
  .toolbar { display:flex; align-items:center; gap:8px; flex:1; flex-wrap:wrap; }
  .toolbar input.path { flex:1; min-width:240px; background:#101113; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:7px 10px; font-size:12px; }
  .toolbar .sep { width:1px; align-self:stretch; background:var(--line); margin:0 4px; }
  #status { color:var(--muted); font-size:12px; margin-left:auto; white-space:nowrap; }

  button { background:var(--accent); color:#fff; border:0; padding:7px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  button:hover { background:var(--accent2); }
  button.secondary { background:#2b2e31; border:1px solid var(--line); }
  button.secondary:hover { background:#373b3f; }
  button:disabled { opacity:.4; cursor:default; }
  select, .toolbar select { background:#101113; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12px; }

  .layout { display:grid; grid-template-columns:280px 1fr; height:calc(100vh - 46px); }
  .grid { overflow-y:auto; border-right:1px solid var(--line); padding:8px; }
  .grid .ghead { color:var(--muted); font-size:11px; padding:4px 6px 8px; text-transform:uppercase; letter-spacing:.05em; }
  .thumb { display:flex; gap:8px; padding:6px; border-radius:6px; cursor:pointer; align-items:center; }
  .thumb:hover { background:var(--panel); }
  .thumb.sel { background:#26417a; }
  .thumb img { width:60px; height:42px; object-fit:cover; background:#000; border-radius:3px; flex:none; }
  .thumb .name { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .thumb .tags { font-size:10px; color:var(--muted); display:flex; gap:6px; }
  .thumb .badge { color:var(--accent); }
  .thumb .pill { color:#c9a14a; }

  .main { overflow-y:auto; padding:16px; }
  .ba { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ba figure { margin:0; }
  .ba figcaption { color:var(--muted); font-size:12px; margin-bottom:4px; }
  .ba img { width:100%; border-radius:6px; background:#000; display:block; }
  .after-wrap { position:relative; cursor:crosshair; }
  .sel-box { position:absolute; border:2px dashed var(--accent); background:rgba(76,139,245,.18); pointer-events:none; border-radius:3px; }
  .fill-canvas { position:absolute; inset:0; width:100%; height:100%; cursor:crosshair; touch-action:none; border-radius:6px; }
  .fill-panel .row { margin-top:8px; }
  .fill-prompt { width:100%; margin-top:8px; }

  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px; }
  .guidance { flex:1; min-width:240px; background:#101113; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:9px 11px; font-size:13px; }
  .guidance::placeholder { color:#6b7177; }
  label.chk { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }

  .controls { margin-top:16px; display:grid; grid-template-columns:1fr 320px; gap:16px; align-items:start; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 14px; }
  .panel h3 { margin:0 0 10px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .slider { display:grid; grid-template-columns:92px 1fr 46px; gap:8px; align-items:center; margin:5px 0; }
  .slider label { font-size:12px; }
  .slider input[type=range] { width:100%; }
  .slider .val { font-size:12px; text-align:right; color:var(--muted); }

  .save-panel .savegrid { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .verdict { font-size:13px; }
  .verdict .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-weight:600; font-size:12px; }
  .tag.accept{background:#1e5e2f;} .tag.revise{background:#7a5a1e;} .tag.reject{background:#7a261e;} .tag.saved{background:#2b5fb8;}
  .verdict ul { margin:8px 0 0; padding-left:18px; color:var(--muted); }
  .rationale { color:var(--muted); font-size:12px; margin-top:8px; font-style:italic; }
  .hint { color:#6b7177; font-size:11px; margin-top:6px; }
  body.dragging::after { content:"⤵  Drop photos to open"; position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:#cfe0ff; background:rgba(18,28,52,.85); border:3px dashed var(--accent); pointer-events:none; }
  .info-btn { background:#2b2e31; border:1px solid var(--line); color:var(--muted); padding:4px 9px; border-radius:6px; font-size:12px; cursor:pointer; }
  .info-btn:hover { color:var(--fg); }
  .popover { position:absolute; top:38px; left:0; z-index:30; max-width:540px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:12px 14px; font-size:12px; line-height:1.5; color:var(--fg); box-shadow:0 10px 28px rgba(0,0,0,.55); }
  .popover h4 { margin:0 0 6px; font-size:12px; color:var(--accent); }
  .popover .scenes { color:var(--muted); margin-top:8px; }
  .popover code { background:#101113; padding:1px 5px; border-radius:4px; }
</style>
</head>
<body>
<header>
  <h1>Autoshop</h1>
  <div class="toolbar">
    <input class="path" id="import-path" placeholder="Import: paste a RAW/PNG/TIFF file or a folder path…" />
    <button id="import-btn">＋ Import</button>
    <button class="secondary" id="open-files" title="Pick files (or just drag photos onto the window)">Open files…</button>
    <input type="file" id="file-input" multiple accept=".arw,.dng,.raf,.nef,.cr2,.cr3,.png,.tif,.tiff,.jpg,.jpeg" style="display:none" />
    <span class="sep"></span>
    <button class="secondary" id="undo" disabled title="Undo (Ctrl+Z)">↶ Undo</button>
    <button class="secondary" id="redo" disabled title="Redo (Ctrl+Y)">↷ Redo</button>
  </div>
  <span id="status"></span>
</header>

<div class="layout">
  <div class="grid" id="grid"></div>
  <div class="main" id="main">
    <p style="color:var(--muted)">Select a photo on the left, or import more above.</p>
  </div>
</div>

<template id="detail-tpl">
  <div class="ba">
    <figure><figcaption>Before (source)</figcaption><img class="before" /></figure>
    <figure>
      <figcaption>After (edit) — drag a box to target a region, or paint a mask for Generative Fill</figcaption>
      <div class="after-wrap"><img class="after" draggable="false" /><div class="sel-box" hidden></div><canvas class="fill-canvas" hidden></canvas></div>
    </figure>
  </div>

  <div class="row">
    <input class="guidance" type="text" placeholder="Direction for the AI, e.g. warmer and moodier, lift the shadows" />
    <label class="chk" title="On: adjust your CURRENT sliders. Off: propose fresh from the original.">
      <input type="checkbox" class="refine" /> Refine current edit
    </label>
  </div>
  <div class="row" style="position:relative">
    <label class="chk" title="How strongly the AI leans on your past editing style (needs a built style-index; 0% = ignore the library, 100% = strongest pull toward your historical look).">
      Style influence
      <input type="range" class="style-strength" min="0" max="100" step="5" value="30" style="width:140px" />
      <span class="style-val">30%</span>
    </label>
    <button type="button" class="info-btn" title="What's in my style library?">ⓘ Library info</button>
    <div class="popover" hidden></div>
  </div>
  <div class="row">
    <button class="analyze">✨ Analyze</button>
    <button class="secondary reset">Reset</button>
  </div>

  <div class="controls">
    <div class="panel sliders"><h3>Develop</h3></div>
    <div>
      <div class="panel" style="margin-bottom:14px">
        <h3>Verdict</h3>
        <div class="verdict">Not analyzed yet.</div>
        <div class="rationale"></div>
      </div>
      <div class="panel save-panel">
        <h3>Save</h3>
        <div class="savegrid">
          <select class="save-format" title="Output format">
            <option value="tif">16-bit TIFF</option>
            <option value="jpg">JPEG (q95)</option>
          </select>
          <label class="chk" title="SCUNet AI denoise before developing — high-ISO / astro (slow, GPU)">
            <input type="checkbox" class="denoise-toggle" /> AI Denoise
          </label>
        </div>
        <div class="row" style="margin-top:0">
          <button class="export">Export → ./out</button>
          <button class="secondary download">Download…</button>
          <button class="secondary savexmp">Save XMP</button>
        </div>
        <div class="hint">Export writes to ./out; Download opens a Save-As. XMP only for RAW.</div>
      </div>
      <div class="panel fill-panel" style="margin-top:14px">
        <h3>Generative Fill · 实验</h3>
        <div class="row" style="margin-top:0">
          <label class="chk" title="Paint over the area to regenerate. While on, box-select is paused."><input type="checkbox" class="fill-toggle" /> Paint mask</label>
          <label class="chk">Brush <input type="range" class="fill-brush" min="8" max="140" step="2" value="44" style="width:90px" /></label>
          <button class="secondary fill-clear" type="button">Clear</button>
        </div>
        <input class="guidance fill-prompt" type="text" placeholder="What should be there, e.g. remove the trash can, extend the sky" />
        <div class="row">
          <select class="fill-quality" title="Higher = more detail, higher cost">
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
          <label class="chk" title="Composite onto the full-sensor develop (e.g. 61MP) so the untouched area keeps native resolution. Slow (renders the full RAW); the removed patch is upscaled. RAW only."><input type="checkbox" class="fill-fullres" /> Full-res</label>
          <button class="fill-run" type="button">Remove / Fill</button>
        </div>
        <div class="hint">Paint the region, write what belongs there, then Remove/Fill. Only the painted area is regenerated; the rest is kept. Default composites onto the source preview (fast); Full-res keeps the untouched area at native resolution (slow, RAW only). Saved to ./out. Needs OPENAI_API_KEY (gpt-image), ~15-40s.</div>
      </div>
    </div>
  </div>
</template>

<script>
const SLIDERS = [
  ["exposure_ev","Exposure",-5,5,0.05],
  ["contrast","Contrast",-100,100,1],
  ["highlights","Highlights",-100,100,1],
  ["shadows","Shadows",-100,100,1],
  ["whites","Whites",-100,100,1],
  ["blacks","Blacks",-100,100,1],
  ["clarity","Clarity",-100,100,1],
  ["dehaze","Dehaze",-100,100,1],
  ["vibrance","Vibrance",-100,100,1],
  ["saturation","Saturation",-100,100,1],
  ["sharpening","Sharpening",0,150,1],
  ["noise_reduction","Noise Reduction",0,100,1],
];
const DEFAULT_RECIPE = {
  version:1, exposure_ev:0, contrast:0, highlights:0, shadows:0, whites:0, blacks:0,
  temperature_k:null, tint:0, vibrance:0, saturation:0, clarity:0, dehaze:0,
  sharpening:0, noise_reduction:0, straighten_deg:0, crop:null, tone_curve:[],
  masks:[], rationale:"", confidence:0
};

let state = { id:null, stem:null, recipe:null };
// Undo/redo history of recipe snapshots for the selected photo.
let history = [], hi = -1;

const $ = s => document.querySelector(s);
const setStatus = t => { $("#status").textContent = t || ""; };

// --- undo / redo -----------------------------------------------------------
function resetHistory(recipe) { history = [structuredClone(recipe)]; hi = 0; updateUndo(); }
function pushHistory(recipe) {
  if (hi >= 0 && JSON.stringify(history[hi]) === JSON.stringify(recipe)) return; // no-op
  history = history.slice(0, hi + 1);
  history.push(structuredClone(recipe));
  hi = history.length - 1;
  updateUndo();
}
function updateUndo() {
  $("#undo").disabled = hi <= 0;
  $("#redo").disabled = hi < 0 || hi >= history.length - 1;
}
function undo() { if (hi > 0) { hi--; applyHistory(); } }
function redo() { if (hi < history.length - 1) { hi++; applyHistory(); } }
function applyHistory() {
  state.recipe = structuredClone(history[hi]);
  syncSliders(); renderAfter(); updateUndo();
  setStatus(`history ${hi + 1}/${history.length}`);
}
$("#undo").onclick = undo;
$("#redo").onclick = redo;
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "y") { e.preventDefault(); redo(); }
});

// --- gallery + import ------------------------------------------------------
async function loadList() {
  const r = await fetch("/api/list");
  const data = await r.json();
  const grid = $("#grid");
  grid.innerHTML = `<div class="ghead">${data.total} source${data.total===1?"":"s"}${data.shown<data.total?` · showing ${data.shown}`:""}</div>`;
  for (const it of data.items) {
    const div = document.createElement("div");
    div.className = "thumb"; div.dataset.id = it.id;
    div.innerHTML = `<img loading="lazy" src="/api/thumb?id=${it.id}"/>
      <div><div class="name">${it.stem}</div>
        <div class="tags">${it.baked?'<span class="pill">PNG/TIFF</span>':''}${it.analyzed?'<span class="badge">● edited</span>':''}</div>
      </div>`;
    div.onclick = () => selectPhoto(it.id, it.stem, div);
    grid.appendChild(div);
  }
}

// After import/upload, refresh the gallery and jump to the first new item so it's
// obvious it worked (new items append at the end, which may be below the fold).
async function revealNew(firstId) {
  await loadList();
  if (firstId == null) return;
  const el = document.querySelector(`.thumb[data-id="${firstId}"]`);
  if (el) { el.scrollIntoView({block:"center"}); el.click(); }
}

$("#import-btn").onclick = async () => {
  // Strip surrounding quotes (Windows "Copy as path" wraps in ") + whitespace.
  const path = $("#import-path").value.trim().replace(/^"+|"+$/g, "").trim();
  if (!path) { setStatus("type or paste a file/folder path to import"); return; }
  setStatus("importing…");
  const r = await fetch("/api/import", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({path})});
  if (!r.ok) { setStatus("import failed: " + await r.text()); return; }
  const d = await r.json();
  $("#import-path").value = "";
  if (d.added > 0) { setStatus(`imported ${d.added} (total ${d.total})`); revealNew(d.total - d.added); }
  else setStatus(`already in the gallery (total ${d.total})`);
};
$("#import-path").addEventListener("keydown", e => { if (e.key === "Enter") $("#import-btn").click(); });

// Drag-drop + file picker. Browsers can't give a local server a dropped file's
// disk PATH (security), so we upload the bytes (saved under ./out/imported).
async function uploadFiles(files) {
  let firstId = null, ok = 0; const failed = [];
  for (const f of files) {
    setStatus(`uploading ${f.name}…`);
    try {
      const buf = await f.arrayBuffer();
      // Header values are Latin-1 only, so percent-encode the name — otherwise a
      // non-ASCII (e.g. Chinese) filename throws and the upload silently fails.
      // The server percent-decodes it back.
      const r = await fetch("/api/upload", {method:"POST", headers:{"X-Filename": encodeURIComponent(f.name)}, body: buf});
      if (!r.ok) { failed.push(`${f.name}: ${await r.text()}`); continue; }
      const d = await r.json();
      if (firstId == null) firstId = d.id;
      ok++;
    } catch (e) { failed.push(`${f.name}: ${e.message || e}`); }
  }
  if (ok) { setStatus(`opened ${ok} file${ok>1?"s":""}${failed.length?` · ${failed.length} failed`:""}`); revealNew(firstId); }
  else if (failed.length) { setStatus(`could not open: ${failed[0]}`); }
}

$("#open-files").onclick = () => $("#file-input").click();
$("#file-input").onchange = e => { if (e.target.files.length) uploadFiles([...e.target.files]); e.target.value = ""; };

let dragDepth = 0;
window.addEventListener("dragenter", e => { e.preventDefault(); if (dragDepth++ === 0) document.body.classList.add("dragging"); });
window.addEventListener("dragover", e => { e.preventDefault(); });
window.addEventListener("dragleave", e => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove("dragging"); } });
window.addEventListener("drop", e => {
  e.preventDefault(); dragDepth = 0; document.body.classList.remove("dragging");
  const files = [...((e.dataTransfer && e.dataTransfer.files) || [])];
  if (files.length) uploadFiles(files);
});

// --- sliders + live preview ------------------------------------------------
function buildSliders(container) {
  container.querySelectorAll(".slider").forEach(e=>e.remove());
  for (const [key,label,min,max,step] of SLIDERS) {
    const row = document.createElement("div");
    row.className = "slider";
    row.innerHTML = `<label>${label}</label>
      <input type="range" min="${min}" max="${max}" step="${step}" data-key="${key}"/>
      <span class="val"></span>`;
    const input = row.querySelector("input");
    input.oninput = () => { state.recipe[key] = parseFloat(input.value); row.querySelector(".val").textContent = input.value; scheduleAfter(); };
    input.onchange = () => pushHistory(state.recipe); // commit to history on release
    container.appendChild(row);
  }
}
function syncSliders() {
  document.querySelectorAll(".slider input").forEach(input=>{
    const k = input.dataset.key;
    input.value = state.recipe[k] ?? 0;
    input.parentElement.querySelector(".val").textContent = (state.recipe[k] ?? 0);
  });
}

let afterTimer = null;
function scheduleAfter() { clearTimeout(afterTimer); afterTimer = setTimeout(renderAfter, 220); }
async function renderAfter() {
  if (state.id === null) return;
  setStatus("rendering preview…");
  const r = await fetch("/api/develop", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id: state.id, recipe: state.recipe})});
  if (!r.ok) { setStatus("render failed"); return; }
  const blob = await r.blob();
  $(".after").src = URL.createObjectURL(blob);
  setStatus("");
}

// --- select + actions ------------------------------------------------------
async function selectPhoto(id, stem, el) {
  document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("sel"));
  if (el) el.classList.add("sel");
  state.id = id; state.stem = stem;
  const main = $("#main");
  main.innerHTML = "";
  main.appendChild($("#detail-tpl").content.cloneNode(true));
  buildSliders(main.querySelector(".sliders"));
  $(".before").src = `/api/preview?id=${id}`;

  const rr = await fetch(`/api/recipe?id=${id}`);
  if (rr.ok) {
    state.recipe = Object.assign(structuredClone(DEFAULT_RECIPE), await rr.json());
    $(".verdict").innerHTML = '<span class="tag saved">SAVED</span> Loaded a previously-saved recipe. Re-run Analyze for a live verdict.';
    showRationale();
  } else {
    state.recipe = structuredClone(DEFAULT_RECIPE);
    $(".verdict").textContent = "Not analyzed yet.";
  }
  syncSliders();
  resetHistory(state.recipe);
  renderAfter();

  const ss = main.querySelector(".style-strength");
  ss.oninput = () => { main.querySelector(".style-val").textContent = ss.value + "%"; };
  const pop = main.querySelector(".popover");
  main.querySelector(".info-btn").onclick = async () => {
    if (!pop.hidden) { pop.hidden = true; return; }
    pop.hidden = false; pop.innerHTML = "Loading…";
    try {
      const d = await (await fetch("/api/style-info")).json();
      if (!d.built) {
        pop.innerHTML = `<h4>No style library yet</h4>The Style slider needs an index of your past edits. Build it once:<br><br><code>autoshop style-index "D:\\path\\to\\your\\library"</code><br><br>It scans your RAW + .xmp pairs (your Lightroom/ACR edits) so the AI can lean toward how you edited similar shots.`;
      } else {
        const scenes = (d.scenes||[]).map(s => `${escapeHtml(s.tag)} ×${s.n}`).join("  ·  ");
        pop.innerHTML = `<h4>Style library: ${d.total} of your edits indexed</h4>The Style slider leans the AI toward how you edited <i>similar</i> shots (matched by EXIF + histogram). 0% ignores your library; higher pulls the recipe toward your historical look (capped so it never fully overrides the AI).<div class="scenes">Scenes it knows: ${scenes || "—"}</div>`;
      }
    } catch (e) { pop.innerHTML = "failed to load style info"; }
  };
  // region box-select wiring (the window-level move/up handlers live at module top)
  state.region = null;
  const wrap = main.querySelector(".after-wrap");
  const selBox = main.querySelector(".sel-box");
  wrap.onmousedown = e => {
    if (!main.querySelector(".fill-canvas").hidden) return; // painting a fill mask: don't box-select
    const rect = wrap.getBoundingClientRect();
    drag = { wrap, box: selBox, x0: e.clientX - rect.left, y0: e.clientY - rect.top };
    selBox.hidden = true; e.preventDefault();
  };
  main.querySelector(".analyze").onclick = analyze;
  main.querySelector(".reset").onclick = ()=>{ state.recipe = structuredClone(DEFAULT_RECIPE); state.region = null; selBox.hidden = true; syncSliders(); pushHistory(state.recipe); renderAfter(); };
  main.querySelector(".savexmp").onclick = saveXmp;
  main.querySelector(".export").onclick = exportFull;
  main.querySelector(".download").onclick = downloadFull;

  // Generative Fill: paint a mask over the After image; only the painted region
  // is regenerated (gpt-image) and composited back onto the full-res original.
  const fc = main.querySelector(".fill-canvas"), fctx = fc.getContext("2d");
  const afterImg = main.querySelector(".after");
  const fillToggle = main.querySelector(".fill-toggle"), brush = main.querySelector(".fill-brush");
  let painting = false, lastPt = null;
  const sizeFill = () => {
    const w = afterImg.clientWidth || 600, h = afterImg.clientHeight || 400;
    if (fc.width !== w || fc.height !== h) { fc.width = w; fc.height = h; }
  };
  afterImg.addEventListener("load", () => { if (!fc.hidden) sizeFill(); });
  fillToggle.onchange = () => {
    if (fillToggle.checked) {
      state.region = null; selBox.hidden = true; fc.hidden = false; sizeFill();
      setStatus("paint over the area to remove/fill, write a prompt, then Remove/Fill");
    } else { fc.hidden = true; }
  };
  const fcPos = e => {
    const r = fc.getBoundingClientRect();
    return { x: (e.clientX - r.left) * fc.width / r.width, y: (e.clientY - r.top) * fc.height / r.height };
  };
  const paint = (a, b) => {
    fctx.fillStyle = "rgba(255,64,64,.5)"; fctx.strokeStyle = "rgba(255,64,64,.5)";
    fctx.lineWidth = +brush.value; fctx.lineCap = "round"; fctx.lineJoin = "round";
    fctx.beginPath(); fctx.arc(b.x, b.y, brush.value / 2, 0, 7); fctx.fill();
    if (a) { fctx.beginPath(); fctx.moveTo(a.x, a.y); fctx.lineTo(b.x, b.y); fctx.stroke(); }
  };
  fc.addEventListener("pointerdown", e => { painting = true; lastPt = fcPos(e); paint(null, lastPt); fc.setPointerCapture(e.pointerId); });
  fc.addEventListener("pointermove", e => { if (!painting) return; const p = fcPos(e); paint(lastPt, p); lastPt = p; });
  fc.addEventListener("pointerup", () => { painting = false; lastPt = null; });
  main.querySelector(".fill-clear").onclick = () => fctx.clearRect(0, 0, fc.width, fc.height);
  main.querySelector(".fill-run").onclick = async () => {
    const prompt = (main.querySelector(".fill-prompt").value || "").trim();
    if (!prompt) { setStatus("write what should fill the painted area"); return; }
    const src = fctx.getImageData(0, 0, fc.width, fc.height).data;
    let any = false; for (let i = 3; i < src.length; i += 4) { if (src[i] > 10) { any = true; break; } }
    if (!any) { setStatus("paint the area to remove/fill first"); return; }
    // Build the RGBA mask: painted → transparent (regenerate), unpainted → opaque.
    const m = document.createElement("canvas"); m.width = fc.width; m.height = fc.height;
    const mctx = m.getContext("2d"), md = mctx.createImageData(fc.width, fc.height);
    for (let i = 0; i < src.length; i += 4) { md.data[i + 3] = src[i + 3] > 10 ? 0 : 255; }
    mctx.putImageData(md, 0, 0);
    const mask = m.toDataURL("image/png");
    const quality = main.querySelector(".fill-quality").value || "high";
    const fullRes = main.querySelector(".fill-fullres").checked;
    const btn = main.querySelector(".fill-run"); btn.disabled = true;
    setStatus(fullRes ? "generative fill (full-res render)… (slow, can take minutes)" : "generative fill via gpt-image… (~15-40s)");
    try {
      const r = await fetch("/api/retouch", {method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ id: state.id, prompt, mask, quality, full_res: fullRes })});
      if (!r.ok) { setStatus("fill failed: " + await r.text()); return; }
      const blob = await r.blob();
      afterImg.src = URL.createObjectURL(blob);
      fctx.clearRect(0, 0, fc.width, fc.height);
      const saved = r.headers.get("X-Output-Path");
      setStatus("filled" + (saved ? " → " + saved : "") + " (saved to ./out; separate from the develop recipe)");
    } finally { btn.disabled = false; }
  };
}

function showVerdict(v) {
  const el = $(".verdict");
  if (!v) { el.textContent = "Not analyzed yet."; return; }
  const reasons = (v.reasons||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join("");
  el.innerHTML = `<span class="tag ${v.decision}">${v.decision.toUpperCase()}</span><ul>${reasons}</ul>`;
}
function showRationale() {
  $(".rationale").textContent = state.recipe.rationale ? `“${state.recipe.rationale}” (confidence ${state.recipe.confidence})` : "";
}
function escapeHtml(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

async function analyze() {
  const gi = document.querySelector(".guidance");
  const guidance = gi && gi.value.trim() ? gi.value.trim() : null;
  const refine = document.querySelector(".refine")?.checked || false;
  setStatus(refine ? "refining your current edit with AI…" : "analyzing with GPT + Claude… (~10-30s)");
  const btn = $(".analyze"); btn.disabled = true;
  try {
    const style = (parseFloat(document.querySelector(".style-strength")?.value ?? "30") || 0) / 100;
    const body = { id: state.id, guidance, style_strength: style };
    if (refine) body.base = state.recipe;          // adjust current edit, don't start over
    if (state.region) body.region = state.region;  // box-select: target this region
    const r = await fetch("/api/analyze", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
    if (!r.ok) { setStatus("analyze failed: " + await r.text()); return; }
    const data = await r.json();
    state.recipe = Object.assign(structuredClone(DEFAULT_RECIPE), data.recipe);
    syncSliders(); showVerdict(data.verdict); showRationale();
    pushHistory(state.recipe); renderAfter();
    setStatus("done");
  } finally { btn.disabled = false; }
}

async function saveXmp() {
  setStatus("saving xmp…");
  const r = await fetch("/api/xmp", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id: state.id, recipe: state.recipe})});
  setStatus(r.ok ? ("xmp saved → " + await r.text()) : "save failed");
}

function saveBody() {
  const dn = document.querySelector(".denoise-toggle")?.checked || false;
  const format = document.querySelector(".save-format")?.value || "tif";
  return { id: state.id, recipe: state.recipe, denoise: dn, format };
}

async function exportFull() {
  const dn = document.querySelector(".denoise-toggle")?.checked;
  setStatus(dn ? "rendering + AI denoise… (GPU, can take minutes)" : "rendering full-resolution… (slow)");
  const btn = $(".export"); btn.disabled = true;
  try {
    const r = await fetch("/api/export", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(saveBody())});
    setStatus(r.ok ? ("exported → " + await r.text()) : "export failed");
  } finally { btn.disabled = false; }
}

async function downloadFull() {
  const fmt = document.querySelector(".save-format")?.value || "tif";
  setStatus("rendering for download…");
  const btn = $(".download"); btn.disabled = true;
  try {
    const r = await fetch("/api/download", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(saveBody())});
    if (!r.ok) { setStatus("download failed: " + await r.text()); return; }
    const blob = await r.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${state.stem || "photo"}.developed.${fmt}`;
    document.body.appendChild(a); a.click(); a.remove();
    setStatus("downloaded");
  } finally { btn.disabled = false; }
}

// Region box-select on the After image (Phase 3): drag a box to anchor a local
// edit; the normalized box is sent with Analyze so the AI masks exactly there.
const clampv = (v, a, b) => Math.max(a, Math.min(b, v));
let drag = null;
window.addEventListener("mousemove", e => {
  if (!drag) return;
  const rect = drag.wrap.getBoundingClientRect();
  const x1 = clampv(e.clientX - rect.left, 0, rect.width), y1 = clampv(e.clientY - rect.top, 0, rect.height);
  drag.box.hidden = false;
  drag.box.style.left = Math.min(drag.x0, x1) + "px";
  drag.box.style.top = Math.min(drag.y0, y1) + "px";
  drag.box.style.width = Math.abs(x1 - drag.x0) + "px";
  drag.box.style.height = Math.abs(y1 - drag.y0) + "px";
});
window.addEventListener("mouseup", e => {
  if (!drag) return;
  const rect = drag.wrap.getBoundingClientRect();
  const x1 = clampv(e.clientX - rect.left, 0, rect.width), y1 = clampv(e.clientY - rect.top, 0, rect.height);
  const l = Math.min(drag.x0, x1) / rect.width, t = Math.min(drag.y0, y1) / rect.height;
  const r = Math.max(drag.x0, x1) / rect.width, b = Math.max(drag.y0, y1) / rect.height;
  const box = drag.box; drag = null;
  if (r - l > 0.02 && b - t > 0.02) {
    state.region = { left: l, top: t, right: r, bottom: b };
    setStatus(`region set ${Math.round((r-l)*100)}×${Math.round((b-t)*100)}% — type a direction, then Analyze (small click clears)`);
  } else { state.region = null; box.hidden = true; setStatus(""); }
});

loadList();
</script>
