[package]
name = "autoshop"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
base64 = "0.22"
clap = { version = "4.6.1", features = ["derive"] }
dotenvy = "0.15"
image = { version = "0.25", default-features = false, features = ["jpeg"] }
rawler = "0.7.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
ureq = { version = "2", features = ["json"] }
